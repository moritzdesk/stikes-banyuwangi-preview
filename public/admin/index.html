<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNIDSOE Admin - Content Manager</title>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* Custom Styling for the sidebar to add a "Smart Link" */
        @keyframes rainbow {
            0% { border-color: #195682; }
            50% { border-color: #f9ac42; }
            100% { border-color: #195682; }
        }
    </style>
</head>
<body>
    <!-- Decap CMS Loading -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
        // Custom UI logic to add an external link to the sidebar
        CMS.registerEventListener({
            name: 'prePublish',
            handler: ({ entry }) => {
                console.log('Publishing:', entry.get('label'));
            },
        });

        // We can add a custom preview or a simple instructional note
        // but the best way to handle "External Link" in Decap is through a dedicated instructional page
    </script>
</body>
</html>
