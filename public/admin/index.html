<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNIDSOE Admin - Content Manager</title>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        /* Styling tambahan agar menu roket terlihat menonjol */
        a[href="#/collections/semesta_link"] {
            color: #195682 !important;
            font-weight: bold !important;
            border-left: 4px solid #f9ac42 !important;
            background: rgba(249, 172, 66, 0.05) !important;
        }
    </style>
</head>
<body>
    <!-- Decap CMS Loading -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
        // TRICK: Intercept sidebar clicks to force open external URL in new tab
        document.addEventListener('click', function(e) {
            // Check if user clicked the "Semesta" menu item or its icon/text
            const semestaLink = e.target.closest('a[href="#/collections/semesta_link"]');
            
            if (semestaLink) {
                e.preventDefault();
                e.stopPropagation();
                
                // Open the specific external URL
                window.open('https://platform-semesta.sclstudio.id', '_blank');
                
                // Keep the active state visually but don't navigate internally
                return false;
            }
        }, true);

        // Optional: Also check on hash change if they directly accessed the URL
        window.addEventListener('hashchange', function() {
            if (window.location.hash === '#/collections/semesta_link') {
                window.open('https://platform-semesta.sclstudio.id', '_blank');
                // Auto go back to previous page or home to avoid empty screen
                history.back();
            }
        });
    </script>
</body>
</html>
